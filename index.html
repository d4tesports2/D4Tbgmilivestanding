<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">

<style>
:root{
    --alive-team-bg: linear-gradient(90deg,rgba(65, 0, 117, 1) 0%, rgba(89, 0, 153, 1) 52%, rgba(75, 0, 130, 1) 100%);
    --finished-team-bg: #020617;
    --table-header-bg: linear-gradient(90deg,#9333ea,#7c3aed);
    --table-font-color:#ffffff;
    --status-bar-active:#00ff9d;
    --status-bar-finished:#ef4444;
    --top5-card-bg: linear-gradient(90deg,rgba(57, 0, 117, 1) 0%, rgba(89, 0, 153, 1) 52%, rgba(75, 0, 130, 1) 100%);
    --popup-bg: linear-gradient(90deg,#7c3aed,#9333ea);
    --map-text-color:#ffffff;
    --table-width:320px;
    --table-row-height:34px;
    --table-row-font-size:13px;
    --table-header-font-size:12px;
    --table-logo-size:18px;
    --table-bar-height:14px;
    --table-row-pad-x:8px;
    --top5-scale:1;
    --popup-scale:1;
    --popup-scale-hidden:0.9;
}

body{
    margin:0;
    font-family:'Rajdhani', sans-serif;
    color:var(--table-font-color);
    overflow:hidden;
    opacity:0;
    transition:opacity 0.15s ease;
}

body.ready{
    opacity:1;
}

/* ================= TOP 5 ================= */
.top5{
    position:absolute;
    top:5px;
    left:50%;
    transform:translateX(-50%);
    scale:var(--top5-scale);
    transform-origin:center top;
    display:flex;
    gap:12px;
}

.top-card{
    display:flex;
    align-items:center;
    gap:14px;
    background:var(--top5-card-bg);
    border:1px solid rgba(0,234,255,0.4);
    padding:12px 16px;
    border-radius:10px;
    width:220px;
    box-shadow:0 0 15px rgba(0,234,255,0.3);
    clip-path:polygon(6% 0%, 70% 0, 90% 100%, 6% 100%);
}

.top-logo{
    width:70px;
    height:70px;
    border:2px solid white;
    border-radius:8px;
}

.top-text{
    line-height:1.3;
    font-size:14px;
}

.top5[data-top5-style="bgmi"] .top-card{
    border:2px solid rgba(245,158,11,0.85);
    border-radius:4px;
    box-shadow:0 0 24px rgba(245,158,11,0.35), 0 12px 30px rgba(0,0,0,0.75);
}

.top5[data-top5-style="neon"] .top-card{
    border:1px solid #22d3ee;
    border-radius:12px;
    clip-path:none;
    color:#67e8f9;
    backdrop-filter:blur(10px);
    box-shadow:0 18px 48px rgba(0,0,0,0.75), 0 0 18px #22d3ee, inset 0 0 18px rgba(34,211,238,0.18);
}

.top5[data-top5-style="compact"]{
    gap:6px;
}

.top5[data-top5-style="compact"] .top-card{
    gap:8px;
    width:170px;
    padding:8px 10px;
    border-radius:3px;
    clip-path:none;
}

.top5[data-top5-style="compact"] .top-logo{
    width:44px;
    height:44px;
}

.top5[data-top5-style="compact"] .top-text{
    font-size:12px;
    line-height:1.15;
}

.top5[data-top5-style="glass"] .top-card{
    background:
        linear-gradient(rgba(15,23,42,0.38), rgba(15,23,42,0.38)),
        var(--top5-card-bg);
    background-blend-mode:normal, screen;
    border:1px solid rgba(255,255,255,0.28);
    border-radius:12px;
    clip-path:none;
    backdrop-filter:blur(10px);
    box-shadow:0 18px 48px rgba(0,0,0,0.75), inset 0 1px 0 rgba(255,255,255,0.18);
}

.top5[data-top5-style="curve_dark"] .top-card{
    border-left:2px solid rgba(255,255,255,0.45);
    border-right:7px solid rgba(125,211,252,0.65);
    border-top:0;
    border-bottom:0;
    border-radius:0;
    clip-path:polygon(0 0, calc(100% - 24px) 0, 100% 50%, calc(100% - 24px) 100%, 0 100%);
    box-shadow:0 3px 0 rgba(167,243,208,0.25);
}

.top5[data-top5-style="curve_dark"] .top-logo{
    border-radius:2px;
}

.top5[data-top5-style="curve_light"] .top-card{
    border:0;
    border-radius:999px;
    clip-path:none;
    background:var(--top5-card-bg);
    box-shadow:0 12px 28px rgba(0,0,0,0.7);
}

.top5[data-top5-style="curve_light"] .top-logo{
    border-color:#64748b;
    border-radius:999px;
}

.top5[data-top5-animation="pop"] .top-card{
    animation:top5Pop 0.38s ease;
}

.top5[data-top5-animation="slide"] .top-card,
.top5[data-top5-animation="slide_io"] .top-card{
    animation:top5Slide 0.42s cubic-bezier(.2,.8,.2,1);
}

.top5[data-top5-animation="smooth"] .top-card{
    animation:top5Smooth 0.7s cubic-bezier(.2,.8,.2,1);
}

.top5[data-top5-animation="fade_io"] .top-card{
    animation:top5Fade 0.42s ease;
}

.top5[data-top5-animation="none"] .top-card{
    animation:none;
}

@keyframes top5Pop{
    0%{ transform:scale(0.92); filter:brightness(1.6); }
    100%{ transform:scale(1); filter:brightness(1); }
}

@keyframes top5Slide{
    0%{ transform:translateY(-30px); opacity:0; }
    100%{ transform:translateY(0); opacity:1; }
}

@keyframes top5Smooth{
    0%{ transform:translateY(-16px); opacity:0.45; }
    100%{ transform:translateY(0); opacity:1; }
}

@keyframes top5Fade{
    0%{ opacity:0; filter:brightness(1.4); }
    100%{ opacity:1; filter:brightness(1); }
}

/* ================= PREMIUM POPUP ================= */
#finishBanner{
    position:absolute;
    top:180px;
    left:50%;
    transform:translateX(-50%) scale(var(--popup-scale-hidden));

    display:flex;
    align-items:stretch;

   background: linear-gradient(90deg,rgba(255, 255, 255, 0) 0%, rgba(87, 199, 133, 0) 50%, rgba(237, 221, 83, 0.15) 100%);

    clip-path:polygon(0 0, 85% 0, 100% 100%, 0% 100%);

    overflow:hidden;

    border:1px solid rgba(255,255,255,0.1);

    box-shadow:
        0 10px 40px rgba(0,0,0,0.8),
        0 0 20px rgba(0,234,255,0.2);

    opacity:0;
    transition:0.35s ease;
}

#finishBanner.show{
    opacity:1;
    transform:translateX(-50%) scale(var(--popup-scale));
}

#finishBanner[data-popup-style="bgmi"]{
    border:2px solid rgba(245,158,11,0.75);
    box-shadow:0 0 24px rgba(245,158,11,0.35), 0 12px 36px rgba(0,0,0,0.85);
}

#finishBanner[data-popup-style="neon"]{
    border:1px solid #22d3ee;
    border-radius:12px;
    clip-path:none;
    backdrop-filter:blur(10px);
    box-shadow:0 0 18px #22d3ee, inset 0 0 18px rgba(34,211,238,0.18), 0 10px 40px rgba(0,0,0,0.8);
}

#finishBanner[data-popup-style="compact"] .left-box img{
    width:118px;
    height:118px;
}

#finishBanner[data-popup-style="compact"] .fin-text{
    font-size:20px;
}

#finishBanner[data-popup-style="compact"] .team-name{
    font-size:18px;
}

#finishBanner[data-popup-style="compact"] .status{
    font-size:32px;
    padding:8px 14px;
}

#finishBanner[data-popup-style="glass"]{
    background:
        linear-gradient(rgba(15,23,42,0.38), rgba(15,23,42,0.38)),
        var(--popup-bg);
    background-blend-mode:normal, screen;
    border:1px solid rgba(255,255,255,0.28);
    border-radius:12px;
    clip-path:none;
    backdrop-filter:blur(10px);
    box-shadow:0 18px 48px rgba(0,0,0,0.75), inset 0 1px 0 rgba(255,255,255,0.18);
}

#finishBanner[data-popup-style="curve_dark"]{
    border-left:2px solid rgba(255,255,255,0.45);
    border-right:9px solid rgba(125,211,252,0.65);
    border-top:0;
    border-bottom:0;
    clip-path:polygon(0 0, calc(100% - 28px) 0, 100% 50%, calc(100% - 28px) 100%, 0 100%);
}

#finishBanner[data-popup-style="curve_light"]{
    border:0;
    border-radius:22px;
    clip-path:none;
    background:rgba(30,41,59,0.84);
    box-shadow:0 12px 28px rgba(0,0,0,0.7);
    overflow:hidden;
}

#finishBanner[data-popup-animation="none"]{
    transition:none;
}

#finishBanner[data-popup-animation="smooth"]{
    transition:0.7s cubic-bezier(.2,.8,.2,1);
}

#finishBanner.show[data-popup-animation="pop"]{
    animation:popupPop 0.4s ease;
}

#finishBanner.show[data-popup-animation="slide"],
#finishBanner.show[data-popup-animation="slide_io"]{
    animation:popupSlide 0.42s cubic-bezier(.2,.8,.2,1);
}

#finishBanner.show[data-popup-animation="fade_io"]{
    animation:popupFade 0.42s ease;
}

@keyframes popupPop{
    0%{ transform:translateX(-50%) scale(calc(var(--popup-scale) * 0.88)); filter:brightness(1.5); }
    100%{ transform:translateX(-50%) scale(var(--popup-scale)); filter:brightness(1); }
}

@keyframes popupSlide{
    0%{ transform:translateX(-50%) translateY(-35px) scale(var(--popup-scale-hidden)); opacity:0; }
    100%{ transform:translateX(-50%) translateY(0) scale(var(--popup-scale)); opacity:1; }
}

@keyframes popupFade{
    0%{ opacity:0; filter:brightness(1.4); }
    100%{ opacity:1; filter:brightness(1); }
}

/* LEFT LOGO */
.left-box{
    background:#f1f5f9;
    padding:0px;

    display:flex;
    align-items:center;
    justify-content:center;

    box-shadow:inset -4px 0 12px rgba(0,0,0,0.4);
}

.left-box img{
    width:162px;
    height:162px;
}

/* RIGHT */
.right-box{
    display:flex;
    flex-direction:column;
}

/* ðŸ”¥ COMMON ANGLED BAR */
.angled{
    position:relative;
    padding:10px 35px 10px 16px;
}

/* FIN */
.top-row{
    background:var(--popup-bg);
    z-index:3;
}

.fin-text{
    font-size:26px;
    font-weight:800;
    letter-spacing:1px;
}

/* TEAM */
.team-name{
    background:linear-gradient(90deg,#0f172a,#1e293b);
    font-size:22px;
    font-weight:700;
    margin-top:-8px;
    z-index:2;
}

/* ELIMINATED */
.status{
    background:var(--popup-bg);
    padding:12px 18px;
    font-size:44px;
    font-weight:900;
    letter-spacing:2px;
    margin-top:-8px;
}

/* ================= TABLE ================= */
.container{
    position:absolute;
    right:20px;
    bottom:10px;

    width:var(--table-width);

    backdrop-filter: blur(10px);
    border:1px solid rgba(0,255,200,0.15);

    box-shadow:
        0 10px 40px rgba(0,0,0,0.8),
        0 0 20px rgba(0,255,200,0.1);

    border-radius:10px;
    overflow:hidden;
}

/* ðŸ”¥ MATCH BAR (ONLY ADDITION) */
#matchBar{
    display:flex;
    align-items:stretch;
    justify-content:flex-start;
    gap:0;
    text-align:left;
    font-weight:800;

    min-height:44px;
    padding:0;

    background:var(--table-header-bg);
    border-bottom:0;

    clip-path:none;

    width:100%;   /* important */
    box-sizing:border-box;
}

.header{
    display:grid;
    grid-template-columns:30px 1fr 28px 25px 30px 40px;
    background:var(--table-header-bg);
    min-height:var(--table-row-height);
    align-items:center;
    padding:0 var(--table-row-pad-x);
    font-size:var(--table-header-font-size);
    border-top:1px solid rgba(255,255,255,0.18);
}

#matchText{
    flex:0 0 74px;
    min-width:74px;
    height:44px;
    display:grid;
    align-content:start;
    text-align:left;
    padding:4px 6px 4px 12px;
    box-sizing:border-box;
}

#mapImage{
    width:130px;
    height:auto;
    object-fit:cover;
    object-position:center;
    border-left:1px solid rgba(255,255,255,0.35);
    border-right:1px solid rgba(255,255,255,0.25);
    margin-right:0;
    margin-top:0;
    align-self:stretch;
}

#mapText{
    flex:1 1 auto;
    min-width:0;
    color:var(--map-text-color);
    font-weight:900;
    font-size:18px;
    line-height:1.05;
    white-space:normal;
    overflow-wrap:anywhere;
    word-break:break-word;
    overflow:hidden;
    display:grid;
    align-content:start;
    text-align:left;
    align-self:stretch;
    padding:4px 8px;
    box-sizing:border-box;
    text-shadow:0 0 5px rgba(0,0,0,0.75);
}

.row{
    display:grid;
    grid-template-columns:18px 1fr 28px 25px 30px 40px;
    align-items:center;
    min-height:var(--table-row-height);
    padding:0 var(--table-row-pad-x);
    font-size:var(--table-row-font-size);
    transition:transform 0.45s cubic-bezier(.2,.8,.2,1), opacity 0.35s ease, filter 0.35s ease;
    will-change:transform, opacity;
}

.row:nth-child(even){ background:#0b1220; }
.row:nth-child(odd){ background:#020617; }

.row.alive{
    background:var(--alive-team-bg);
}

.row.finished{
    background:var(--finished-team-bg) !important;
    opacity:0.8;
}

.team{
    display:flex;
    align-items:center;
    gap:3px;
}

.logo{
    width:var(--table-logo-size);
    height:var(--table-logo-size);
    border:2px solid white;
    border-radius:5px;
}

/* ALIGN */
[data-col="chicken"],
[data-col="kills"],
[data-col="total"]{
    text-align:center;
}

[data-col="status"]{
    text-align:right;
}

.chicken-head{
    font-size:15px;
    line-height:1;
    filter:drop-shadow(0 0 4px rgba(255,215,0,0.7));
}

/* ALIVE BARS */
.alive-box{
    display:flex;
    justify-content:flex-end;
    gap:2px;
}

.bar{
    width:5px;
    height:var(--table-bar-height);
    background:var(--status-bar-finished);
}
.bar.active{
    background:var(--status-bar-active);
}
.row.finished .bar{
    background:var(--status-bar-finished);
}

/* ANIMATION */
.row.flash{
    animation:flashRed 0.6s;
}
@keyframes flashRed{
    0%{background:red;}
    100%{background:#020617;}
}

.row.out{
    transform:translateX(400px);
    opacity:0;
}

.container[data-animation="fade_io"] .row.out{
    transform:none;
    opacity:0;
}

.container[data-animation="slide_io"] .row.out{
    transform:translateX(420px);
    opacity:0;
}

.container[data-table-style="bgmi"]{
    border:2px solid rgba(245,158,11,0.75);
    border-radius:4px;
    box-shadow:0 0 24px rgba(245,158,11,0.35), 0 12px 36px rgba(0,0,0,0.85);
}
.container[data-table-style="bgmi"] #matchBar{
    background:var(--table-header-bg);
    clip-path:none;
}
.container[data-table-style="bgmi"] .header{
    background:var(--table-header-bg);
    color:#fde68a;
}

.container[data-table-style="neon"]{
    border:1px solid #22d3ee;
    border-radius:12px;
    backdrop-filter:blur(10px);
    box-shadow:0 18px 48px rgba(0,0,0,0.75), 0 0 18px #22d3ee, inset 0 0 18px rgba(34,211,238,0.18);
}
.container[data-table-style="neon"] #matchBar,
.container[data-table-style="neon"] .header{
    background:var(--table-header-bg);
    color:#67e8f9;
}
.container[data-table-style="neon"] .row{
    border-bottom:1px solid rgba(34,211,238,0.18);
}

.container[data-table-style="compact"]{
    width:310px;
    border-radius:3px;
}
.container[data-table-style="compact"] #matchBar{
    padding:4px 12px;
    clip-path:none;
}
.container[data-table-style="compact"] .header{
    padding:6px;
    font-size:10px;
}
.container[data-table-style="compact"] .row{
    padding:5px 6px;
    font-size:12px;
}
.container[data-table-style="compact"] .logo{
    width:15px;
    height:15px;
}

.container[data-table-style="glass"]{
    background:
        linear-gradient(rgba(15,23,42,0.38), rgba(15,23,42,0.38)),
        var(--alive-team-bg);
    background-blend-mode:normal, screen;
    border:1px solid rgba(255,255,255,0.28);
    border-radius:12px;
    box-shadow:0 18px 48px rgba(0,0,0,0.75), inset 0 1px 0 rgba(255,255,255,0.18);
}
.container[data-table-style="glass"] #matchBar,
.container[data-table-style="glass"] .header{
    background:var(--table-header-bg);
    clip-path:none;
}
.container[data-table-style="glass"] .row{
    margin:3px;
    border-radius:6px;
    background:
        linear-gradient(rgba(15,23,42,0.28), rgba(15,23,42,0.28)),
        var(--alive-team-bg);
    background-blend-mode:normal, screen;
}
.container[data-table-style="glass"] .row.finished{
    background:
        linear-gradient(rgba(15,23,42,0.28), rgba(15,23,42,0.28)),
        var(--finished-team-bg) !important;
    background-blend-mode:normal, screen;
}

.container[data-table-style="curve_dark"]{
    border:0;
    border-radius:0;
    background:transparent;
    box-shadow:none;
    overflow:visible;
}
.container[data-table-style="curve_dark"] #matchBar{
    background:var(--table-header-bg);
    color:var(--table-font-color);
    clip-path:polygon(0 0, 97% 0, 100% 50%, 97% 100%, 0 100%);
}
.container[data-table-style="curve_dark"] .header{
    background:var(--table-header-bg);
    color:var(--table-font-color);
    clip-path:polygon(0 0, 97% 0, 100% 50%, 97% 100%, 0 100%);
    border-top:0;
}
.container[data-table-style="curve_dark"] .row{
    margin:4px 10px 4px 0;
    background:var(--alive-team-bg);
    color:var(--table-font-color);
    border-left:2px solid rgba(255,255,255,0.45);
    border-right:7px solid rgba(125,211,252,0.65);
    clip-path:polygon(0 0, calc(100% - 18px) 0, 100% 50%, calc(100% - 18px) 100%, 0 100%);
    box-shadow:0 3px 0 rgba(167,243,208,0.25);
}
.container[data-table-style="curve_dark"] .row.alive{
    background:var(--alive-team-bg);
}
.container[data-table-style="curve_dark"] .row.finished{
    background:var(--finished-team-bg) !important;
}
.container[data-table-style="curve_dark"] .logo{
    border-radius:2px;
}

.container[data-table-style="curve_light"]{
    border:0;
    border-radius:18px;
    background:rgba(30,41,59,0.84);
    padding:5px 4px 8px;
    box-shadow:0 12px 28px rgba(0,0,0,0.7);
}
.container[data-table-style="curve_light"] #matchBar{
    border-radius:14px 14px 6px 6px;
    overflow:hidden;
    clip-path:none;
}
.container[data-table-style="curve_light"] .header{
    background:var(--table-header-bg);
    color:var(--table-font-color);
    border-top:0;
}
.container[data-table-style="curve_light"] .row{
    margin:3px 0;
    border-radius:999px;
    background:var(--alive-team-bg);
    color:var(--table-font-color);
    overflow:hidden;
}
.container[data-table-style="curve_light"] .row.alive{
    background:var(--alive-team-bg);
}
.container[data-table-style="curve_light"] .row.finished{
    background:var(--finished-team-bg) !important;
    color:var(--table-font-color);
}
.container[data-table-style="curve_light"] .bar{
    width:7px;
    border-radius:999px;
}
.container[data-table-style="curve_light"] .logo{
    border-color:#64748b;
    border-radius:999px;
}

.row.anim-pop{
    animation:rowPop 0.38s ease;
}
@keyframes rowPop{
    0%{ transform:scale(0.96); filter:brightness(1.7); }
    100%{ transform:scale(1); filter:brightness(1); }
}
.row.anim-slide-io{
    animation:rowSlideIn 0.42s cubic-bezier(.2,.8,.2,1);
}
@keyframes rowSlideIn{
    0%{ transform:translateX(120px); opacity:0; }
    100%{ transform:translateX(0); opacity:1; }
}
.row.anim-fade-io{
    animation:rowFadeIn 0.42s ease;
}
@keyframes rowFadeIn{
    0%{ opacity:0; filter:brightness(1.4); }
    100%{ opacity:1; filter:brightness(1); }
}
</style>
</head>

<body>

<div class="top5" id="top5"></div>

<!-- POPUP -->
<div id="finishBanner">

    <div class="left-box">
        <img id="popupLogo" src="">
    </div>

    <div class="right-box">
        <div class="top-row angled">
            <div class="fin-text" id="popupKill">0 FINISHES</div>
        </div>

        <div class="team-name angled" id="popupTeam">TEAM</div>

        <div class="status">ELIMINATED</div>
    </div>

</div>

<div class="container">

    <!-- ðŸ”¥ MATCH BAR -->
    <div id="matchBar">
        <span id="matchText"></span>
        <img id="mapImage" src="" alt="">
        <span id="mapText"></span>
    </div>

    <div class="header">
        <div data-col="rank">#</div>
        <div data-col="team">TEAM</div>
        <div data-col="chicken" class="chicken-head">&#128020;</div>
        <div data-col="kills">FIN</div>
        <div data-col="total">T P </div>
        <div data-col="status">STATUS</div>
    </div>

    <div id="teams"></div>

        if(typeof value === "string") return !["0", "false", "no", "off", "hide", "hidden"].includes(value.toLowerCase());
        return !!value;
    }
    return defaultOverlayLayout[key];
}

function normalizeLayout(layout){

function applyOverlayLayout(layout){
    let clean = normalizeLayout(layout);
    let table = document.querySelector(".container");
    let top5 = document.getElementById("top5");
    let matchBar = document.getElementById("matchBar");
    let finishBanner = document.getElementById("finishBanner");
    let header = document.querySelector(".header");
    let mapImage = document.getElementById("mapImage");
    let mapText = document.getElementById("mapText");
    let matchText = document.getElementById("matchText");

    table.style.left = "auto";
    table.style.right = "auto";
    table.style.top = "auto";
    table.style.bottom = "auto";
    if(clean.table_x === "center"){
        table.style.left = "50%";
        table.style.transform = `translate(calc(-50% + ${clean.offset_x}px), ${clean.offset_y}px)`;
    }else{
        table.style[clean.table_x] = "20px";
        table.style.transform = `translate(${clean.offset_x}px, ${clean.offset_y}px)`;
    }
    table.style[clean.table_y] = "10px";
    table.style.color = clean.font_color || defaultOverlayLayout.font_color;
    table.style.width = clean.table_width + "px";

    let rowFontSize = Math.max(10, Math.min(18, Math.round(clean.table_row_height * 0.38)));
    let headerFontSize = Math.max(9, Math.min(16, rowFontSize - 1));
    let logoSize = Math.max(14, Math.min(30, clean.table_row_height - 14));
    let barHeight = Math.max(10, Math.min(28, clean.table_row_height - 18));
    let padX = Math.max(6, Math.min(12, Math.round(clean.table_row_height * 0.24)));
    document.documentElement.style.setProperty("--table-width", clean.table_width + "px");
    document.documentElement.style.setProperty("--table-row-height", clean.table_row_height + "px");
    document.documentElement.style.setProperty("--table-row-font-size", rowFontSize + "px");
    document.documentElement.style.setProperty("--table-header-font-size", headerFontSize + "px");
    document.documentElement.style.setProperty("--table-logo-size", logoSize + "px");
    document.documentElement.style.setProperty("--table-bar-height", barHeight + "px");
    document.documentElement.style.setProperty("--table-row-pad-x", padX + "px");
    document.documentElement.style.setProperty("--top5-scale", (clean.top5_scale / 100).toFixed(2));
    document.documentElement.style.setProperty("--popup-scale", (clean.popup_scale / 100).toFixed(2));
    document.documentElement.style.setProperty("--popup-scale-hidden", ((clean.popup_scale / 100) * 0.9).toFixed(2));

    top5.style.top = "auto";
    top5.style.bottom = "auto";
    top5.style.left = "auto";
    top5.style.right = "auto";
    top5.style[clean.top5_y] = "5px";
    if(clean.top5_x === "center"){
        top5.style.left = "50%";
        top5.style.transform = `translate(calc(-50% + ${clean.top5_offset_x}px), ${clean.top5_offset_y}px)`;
        top5.style.transformOrigin = clean.top5_y === "bottom" ? "center bottom" : "center top";
    }else{
        top5.style[clean.top5_x] = "20px";
        top5.style.transform = `translate(${clean.top5_offset_x}px, ${clean.top5_offset_y}px)`;
        top5.style.transformOrigin = `${clean.top5_x} ${clean.top5_y}`;
    }

    document.documentElement.style.setProperty("--alive-team-bg", clean.alive_color || defaultOverlayLayout.alive_color);
    document.documentElement.style.setProperty("--finished-team-bg", clean.finished_color || defaultOverlayLayout.finished_color);
    document.documentElement.style.setProperty("--table-header-bg", clean.header_color || defaultOverlayLayout.header_color);
    document.documentElement.style.setProperty("--table-font-color", clean.font_color || defaultOverlayLayout.font_color);
    document.documentElement.style.setProperty("--status-bar-active", clean.status_bar_color || defaultOverlayLayout.status_bar_color);
    document.documentElement.style.setProperty("--status-bar-finished", clean.finished_status_bar_color || defaultOverlayLayout.finished_status_bar_color);
    document.documentElement.style.setProperty("--top5-card-bg", clean.top5_color || defaultOverlayLayout.top5_color);
    document.documentElement.style.setProperty("--popup-bg", clean.popup_color || defaultOverlayLayout.popup_color);
    document.documentElement.style.setProperty("--map-text-color", clean.map_text_color || defaultOverlayLayout.map_text_color);
    if(matchBar){
        matchBar.style.background = clean.header_color || defaultOverlayLayout.header_color;
        matchBar.style.minHeight = Math.max(46, clean.map_text_height + 7) + "px";

    if(header) header.style.background = clean.header_color || defaultOverlayLayout.header_color;
    if(mapImage){
        mapImage.src = clean.map_image || defaultOverlayLayout.map_image;
        mapImage.alt = clean.map_name || defaultOverlayLayout.map_name;
    }
    if(mapText){
        let verticalAlign = clean.map_text_valign === "middle" ? "center" : (clean.map_text_valign === "bottom" ? "end" : "start");
        mapText.innerText = clean.side_text || clean.map_text || "";
        mapText.dataset.baseSize = clean.map_text_size;
        mapText.dataset.boxHeight = clean.map_text_height;
        mapText.style.setProperty("font-size", clean.map_text_size + "px", "important");
        mapText.style.height = clean.map_text_height + "px";
        mapText.style.maxHeight = clean.map_text_height + "px";
        mapText.style.textAlign = clean.map_text_align;
        mapText.style.alignContent = verticalAlign;
        requestAnimationFrame(fitMapText);

    if(matchText){

        matchText.style.textAlign = clean.match_text_align;

    if(finishBanner){
        finishBanner.dataset.popupStyle = clean.popup_style;
        finishBanner.dataset.popupAnimation = clean.popup_animation_style;
    }
    return clean;
}

function applyTableColumns(layout){
    let visibleColumns = tableColumns.filter(column => layout[column.field]);
    if(visibleColumns.length === 0){
        visibleColumns = tableColumns;
    }

    let gridTemplate = visibleColumns.map(column => column.width).join(" ");
    document.querySelector(".header").style.gridTemplateColumns = gridTemplate;
    document.querySelectorAll(".row").forEach(row=>{
        row.style.gridTemplateColumns = gridTemplate;
    });

    tableColumns.forEach(column=>{
        let display = visibleColumns.includes(column) ? "" : "none";
        document.querySelectorAll(`[data-col="${column.col}"]`).forEach(el=>{
            el.style.display = display;
        });
    });
}

function rowKey(team){
    return String(team || "").replace(/[^a-zA-Z0-9_-]/g, "_");
}

function getRowPositions(){
    let positions = {};
    document.querySelectorAll("#teams .row").forEach(row=>{
        positions[row.dataset.teamKey] = row.getBoundingClientRect().top;
    });
    return positions;
}

function animateTableRows(previousPositions, animationStyle){
    if(animationStyle === "none") return;

    let duration = animationStyle === "smooth" ? 700 : 430;
    document.querySelectorAll("#teams .row").forEach(row=>{
        let previousTop = previousPositions[row.dataset.teamKey];
        if(previousTop === undefined){
            if(animationStyle === "pop"){
                row.classList.add("anim-pop");
                setTimeout(()=>row.classList.remove("anim-pop"), 420);
            }else if(animationStyle === "slide_io"){
                row.classList.add("anim-slide-io");
                setTimeout(()=>row.classList.remove("anim-slide-io"), 460);
            }else if(animationStyle === "fade_io"){
                row.classList.add("anim-fade-io");
                setTimeout(()=>row.classList.remove("anim-fade-io"), 460);
            }
            return;
        }

        let currentTop = row.getBoundingClientRect().top;
        let deltaY = previousTop - currentTop;
        if(Math.abs(deltaY) < 1){
            if(animationStyle === "pop"){
                row.classList.add("anim-pop");
                setTimeout(()=>row.classList.remove("anim-pop"), 420);
            }else if(animationStyle === "fade_io"){
                row.classList.add("anim-fade-io");
                setTimeout(()=>row.classList.remove("anim-fade-io"), 460);
            }
            return;
        }

        row.style.transition = "none";
        row.style.transform = `translateY(${deltaY}px)`;
        if(animationStyle === "pop") row.classList.add("anim-pop");
        if(animationStyle === "fade_io") row.style.opacity = "0.35";

        requestAnimationFrame(()=>{
            row.style.transition = `transform ${duration}ms cubic-bezier(.2,.8,.2,1), opacity 350ms ease, filter 350ms ease`;
            row.style.transform = "";
            row.style.opacity = "";
            if(animationStyle === "pop"){
                setTimeout(()=>row.classList.remove("anim-pop"), 420);
            }
        });
    });
}

function fitMapText(){
    let text = document.getElementById("mapText");
    if(!text) return;

    let baseSize = parseInt(text.dataset.baseSize || defaultOverlayLayout.map_text_size, 10);
    let boxHeight = parseInt(text.dataset.boxHeight || defaultOverlayLayout.map_text_height, 10);
    if(Number.isNaN(baseSize)) baseSize = defaultOverlayLayout.map_text_size;
    if(Number.isNaN(boxHeight)) boxHeight = defaultOverlayLayout.map_text_height;
    baseSize = Math.max(8, Math.min(64, baseSize));
    boxHeight = Math.max(40, Math.min(180, boxHeight));
    let matchBar = document.getElementById("matchBar");
    if(matchBar){
        matchBar.style.minHeight = Math.max(46, boxHeight + 7) + "px";
    }
    text.style.height = boxHeight + "px";
    text.style.maxHeight = boxHeight + "px";
    let sizes = [baseSize, baseSize - 2, baseSize - 4, baseSize - 6, baseSize - 8, 10, 8]
        .filter((size, index, arr)=>size >= 8 && arr.indexOf(size) === index);
    for(let size of sizes){
        text.style.setProperty("font-size", size + "px", "important");
        if(text.scrollHeight <= text.clientHeight + 1 && text.scrollWidth <= text.clientWidth + 1){
            break;
        }
    }
}

function getLogo(team){
    return "logos/"+String(team || "default").toLowerCase().replace(/\\s/g,"")+".png";
}

function aliveBars(n){
    let h="";
    for(let i=0;i<4;i++){
        h+=`<div class="bar ${i<n?'active':''}"></div>`;
    }
    return h;
}

function showPopup(team,kills,aliveTeams){

    let banner = document.getElementById("finishBanner");

    document.getElementById("popupTeam").innerText = team;
    document.getElementById("popupKill").innerText = kills + " FINISHES";
    document.getElementById("popupLogo").src = getLogo(team);

    if(Number.isFinite(finishPos)){
        document.getElementById("popupTeam").innerText = "#" + finishPos + " - " + team;
    }

    banner.classList.add("show");

        banner.classList.remove("show");
    },6000);
}
function hasRenderableData(data){
    return data && typeof data === "object" && Array.isArray(data.teams);
}

function update(data){
    if(!hasRenderableData(data)){
        document.body.classList.add("ready");
        return;
    }

    let signature = JSON.stringify({
        remaining_players: data.remaining_players || "",
        alive_teams: data.alive_teams || "",
        match_no: data.match_no || 1,
        teams: data.teams || [],
        top_players: data.top_players || [],
        show_top5: !!data.show_top5,
        overlay_layout: data.overlay_layout || {}
    });
    if(signature === lastRenderedSignature) return;
    lastRenderedSignature = signature;

    let incomingLayout = data.overlay_layout && Object.keys(data.overlay_layout).length
    ? data.overlay_layout
    : lastValidOverlayLayout;

if (incomingLayout) {
    lastValidOverlayLayout = incomingLayout;
}

let layout = applyOverlayLayout(incomingLayout || defaultOverlayLayout);
    let previousPositions = getRowPositions();

    // ðŸ”¥ MATCH NO UPDATE (ONLY ADDITION)
    document.getElementById("matchText").innerText = "MATCH " + (data.match_no || 1);

    let teams = (data.teams || []).sort((a,b)=>{
        if((b.total||0)!==(a.total||0)) return (b.total||0)-(a.total||0);

        let aliveA = a.finished?0:(a.alive||0);
        let aliveB = b.finished?0:(b.alive||0);

        if(aliveB!==aliveA) return aliveB-aliveA;

        return (b.kills||0)-(a.kills||0);
    });

    let html="";

    teams.forEach((t,i)=>{
        let key = rowKey(t.team);
        html+=`
        <div class="row ${t.finished ? 'finished' : 'alive'}" id="team-${key}" data-team-key="${key}">
            <div data-col="rank">${i+1}</div>
            <div data-col="team" class="team">
                <img class="logo" src="${getLogo(t.team)}">
                ${t.team}
            </div>
            <div data-col="chicken">${t.chicken||0}</div>
            <div data-col="kills">${t.kills||0}</div>
            <div data-col="total">${t.total||0}</div>
            <div data-col="status" class="alive-box">
                ${aliveBars(t.finished?0:(t.alive||0))}
            </div>
        </div>`;
    });

    document.getElementById("teams").innerHTML = html;
    applyTableColumns(layout);
    animateTableRows(previousPositions, layout.animation_style);

    let finishedTeam = teams.find(t=>t.finished);

    if(finishedTeam && lastFinished!==finishedTeam.team){
        lastFinished = finishedTeam.team;

        showPopup(finishedTeam.team, finishedTeam.kills, data.alive_teams);

        let row = document.getElementById("team-"+rowKey(finishedTeam.team));

        if(row){
            row.classList.add("flash");

            setTimeout(()=>{
                row.classList.add("out");
            },300);
        }
    }

    let topHTML="";
    if(data.show_top5){
        (data.top_players||[]).forEach((p,i)=>{
            topHTML+=`
            <div class="top-card">
                <img class="top-logo" src="${getLogo(p.team)}">
                <div class="top-text">
                    #${i+1}<br>
                    ${p.team}<br>
                    ${p.name}<br>
                    ${p.kills} KILLS
                </div>
            </div>`;
        });
    }

    document.getElementById("top5").innerHTML = topHTML;
    document.body.classList.add("ready");
}

function fetchData(){
    fetch(API_BASE_URL + "?nocache=" + Date.now(), {
    cache: "no-store",
    headers: {
        "Cache-Control": "no-cache",
        "Pragma": "no-cache"
    }
})
    .then(r=>{
        if(!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
    })
    .then(update)
    .catch(err=>{
        console.log("overlay data error", err);
        document.body.classList.add("ready");
    });
}

setInterval(fetchData,2000);
fetchData();

</script>
